                <div style="text-align:center"><div style="font-size:0.6rem;color:var(--text-muted)">Ánimo</div><div style="font-weight:800;color:var(--primary)">${rev.animo}/5</div></div>
                <div style="text-align:center"><div style="font-size:0.6rem;color:var(--text-muted)">Sueño</div><div style="font-weight:800;color:#a78bfa">${rev.sueno||'?'}</div></div>
              </div>
              ${rev.observacionesEntrenador ? `<div style="margin-top:8px;padding:8px;background:rgba(0,200,255,0.06);border:1px solid rgba(0,200,255,0.15);border-radius:8px;font-size:0.78rem">
                <div style="font-size:0.65rem;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">💬 Observaciones del entrenador</div>
                <div>${rev.observacionesEntrenador}</div>
              </div>` : ''}
            </div>`).join('')}
          ${revMeses.length > 0 ? `
          <div class="card-title" style="margin-top:16px">📅 Revisiones mensuales</div>
          ${revMeses.slice(-3).reverse().map(([key, rev]) => `
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;margin-bottom:8px">
              <div style="font-size:0.78rem;font-weight:700;color:var(--accent);margin-bottom:8px">📅 Mes ${rev.mes||'?'}</div>
              ${rev.observacionesEntrenador ? `<div style="padding:8px;background:rgba(123,47,255,0.06);border:1px solid rgba(123,47,255,0.15);border-radius:8px;font-size:0.78rem">
                <div style="font-size:0.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">💬 Observaciones del entrenador</div>

  // ─── Render charts con setTimeout para que el DOM esté listo ───
  setTimeout(() => {
    // Valoraciones charts
    const baseChartOpts = {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(232,244,255,0.5)',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(232,244,255,0.5)',font:{size:10}}}
      }
    };

    if(hasValoraciones && valoraciones.length >= 2) {
      const cComp = document.getElementById('chartComposicion');
      if(cComp) {
        if(cComp._chart) cComp._chart.destroy();

          type:'line',
          data:{
            labels: valLabels,
            datasets:[
              { label:'% Grasa', data:valoraciones.map(v=>v.grasa), borderColor:'#ff6b35', backgroundColor:'rgba(255,107,53,0.15)', tension:0.4, fill:true, pointBackgroundColor:'#ff6b35', pointRadius:5 },

            ]
          },
          options:{...baseChartOpts, plugins:{...baseChartOpts.plugins, legend:{display:true, labels:{color:'rgba(232,244,255,0.7)',font:{size:10}}}}}
        });
      }
      const cPeso = document.getElementById('chartPesoTrend');
      if(cPeso) {
        if(cPeso._chart) cPeso._chart.destroy();
        cPeso._chart = new Chart(cPeso, {
          type:'line',
          data:{
            labels: valLabels,
            datasets:[{ label:'Peso (kg)', data:valoraciones.map(v=>v.peso), borderColor:'#00c8ff', backgroundColor:(ctx)=>{ const g=ctx.chart.ctx.createLinearGradient(0,0,0,130); g.addColorStop(0,'rgba(0,200,255,0.25)'); g.addColorStop(1,'rgba(0,200,255,0)'); return g; }, tension:0.4, fill:true, pointBackgroundColor:'#00c8ff', pointRadius:5 }]
          },
          options:baseChartOpts
        });
      }
    }

    // Pro charts (solo si hay sesiones)
    if(allSessions.length > 0) {
      window._myPcTypes = { carga:'line', rpe:'line', vol:'bar', sesint:'line', dur:'line', frec:'bar', topej:'bar', desc:'line' };

      window.myPcType = (chartId, type) => {
        window._myPcTypes[chartId] = type;
        ['line','bar'].forEach(t=>{
          const b = document.getElementById(`mypct_${chartId}_${t}`);
          if(b) b.classList.toggle('active', t===type);
        });
        myPcRefresh(chartId);
      };

      window.myPcRefresh = (chartId) => {
        const type = window._myPcTypes[chartId]||'line';
        if(chartId==='carga') {
          renderProChart('myChartCarga', type, labels, buildCarga(document.getElementById('myCarga')?.value||'', type));
        } else if(chartId==='rpe') {
          renderProChart('myChartRpe', type, labels, buildRPE(document.getElementById('myRpe')?.value||'', type));
        } else if(chartId==='vol') {
          renderProChart('myChartVol', type, labels, buildVol(document.getElementById('myVol')?.value||'', type));
        } else if(chartId==='sesint') {
          const sem = +document.getElementById('mySesint')?.value || semMin;
          const {lbs, vals} = buildIntSesion(sem);
          renderProChart('myChartSesInt', type, lbs, vals.length?[makeProDataset('Intensidad percibida',vals,0,type)]:[], {min:0,max:10});
        } else if(chartId==='dur') {
          renderProChart('myChartDur', 'line', labels, buildDuracion());
        } else if(chartId==='frec') {
          renderProChart('myChartFrec', 'bar', labels, buildFrecuencia());
        } else if(chartId==='topej') {
          const {lbs, vals} = buildTopEjercicios();
          renderProChart('myChartTopEj', 'bar', lbs, vals.length?[{label:'Series totales',data:vals, backgroundColor:PRO_PALETTE.map(c=>c+'88'), borderColor:PRO_PALETTE, borderWidth:2, borderRadius:6}]:[]);
        } else if(chartId==='desc') {
          const ds = buildDescanso();
          const optsDesc = proChartOptions({min:0,max:10});
          optsDesc.scales.y.ticks = { color:'rgba(232,244,255,0.5)', font:{family:'Exo 2',size:10}, callback:v=>v===0?'0':v===5?'5':v===10?'10':v };
          let canvas2 = document.getElementById('myChartDesc');
          if(!canvas2) { const w=document.querySelector('[data-canvas="myChartDesc"]'); if(w){w.innerHTML=`<canvas id="myChartDesc"></canvas>`;canvas2=document.getElementById('myChartDesc');} }
          if(!canvas2) return;
          if(canvas2._proChart){canvas2._proChart.destroy();canvas2._proChart=null;}
          const hasD=ds.some(d=>d.data&&d.data.some(v=>v!=null&&v>0));
          if(!hasD){ const w=canvas2.parentElement; if(w){w.setAttribute('data-canvas','myChartDesc');w.innerHTML=`<div class="pro-chart-empty"><div class="ico">📭</div><span>Sin datos aún</span></div>`;} return; }
          canvas2._proChart = new Chart(canvas2, {type:'line', data:{labels, datasets:ds}, options:optsDesc});
        }
      };

      // Render inicial de todos los charts pro
      myPcRefresh('carga');
      myPcRefresh('rpe');
      myPcRefresh('vol');
      myPcRefresh('sesint');
      myPcRefresh('dur');
      myPcRefresh('frec');
      myPcRefresh('topej');
      myPcRefresh('desc');
    }
  }, 120);
}

    <div style="text-align:center;padding:10px">
      <button class="btn btn-danger btn-sm" onclick="logout()">🚪 Cerrar Sesión</button>
    </div>
  `;

  // Funciones del picker — en scope de renderPerfil para capturar selectedAvatarUser
  window.toggleAvatarPicker = (forceState) => {
    const wrap = document.getElementById('avatarPickerWrap');
    if(!wrap) return;
    const isOpen = wrap.style.display !== 'none';
    const opening = forceState !== false ? !isOpen : false;
    wrap.style.display = opening ? 'block' : 'none';
    if(opening) wrap.scrollIntoView({ behavior:'smooth', block:'nearest' });
  };

  window.pickAvatar = (url, el) => {
    selectedAvatarUser = url;
    document.querySelectorAll('.av-opt').forEach(a => a.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('perfilAvatar').src = url;
  };

  window.saveAvatar = async () => {
    try {
      await set(ref(db, `usuarios/${currentUser.id}/avatar`), selectedAvatarUser);
      // Actualizar sesión local
      currentUser.avatar = selectedAvatarUser;
      sessionStorage.setItem('saykyo_user', JSON.stringify(currentUser));
      // Actualizar header
      document.getElementById('userAvatar').src = selectedAvatarUser;
      document.getElementById('avatarPickerWrap').style.display = 'none';
      Swal.fire({icon:'success',title:'¡Avatar actualizado!',timer:1500,showConfirmButton:false,
        background:'rgba(10,20,40,0.95)',color:'#e8f4ff'});
    } catch(e) {
      Swal.fire({icon:'error',title:'Error',text:e.message,background:'rgba(10,20,40,0.95)',color:'#e8f4ff',confirmButtonColor:'#ff4d6d'});
    }
  };
}

// ── WATCHER DE SESIÓN EN TIEMPO REAL ─────────────────────────────────────────
// Abre un listener onValue sobre el nodo del usuario en Realtime DB.
// Si el admin desactiva la cuenta o vence la membresía con la sesión abierta,
// detecta el cambio al instante y fuerza el cierre de sesión.
//
// Por qué es necesario: Firebase Auth NO revoca tokens automáticamente cuando
// un campo de la base de datos cambia, por lo que onAuthStateChanged no dispara.
// Este watcher cubre ese hueco escuchando directamente el nodo del usuario.

let _swRef      = null;
let _swListener = null;
let _swBooted   = false; // ignora el primer disparo (estado inicial al conectar)

function parseEndOfLocalDay(str) {
  if (!str) return null;
  if (str.includes('T')) return new Date(str);
  const [y, m, d] = str.split('-').map(Number);
  // 23:59:59 local — el usuario tiene acceso todo el día de vencimiento
  return new Date(y, m - 1, d, 23, 59, 59, 999);
}

let _membershipCheckInterval = null;

async function checkMembershipExpiry() {
  // Lee el nodo actual del usuario desde Firebase (no caché)
  try {
    const snap = await get(ref(db, `usuarios/${currentUser.id}`));
    if (!snap.exists()) return;
    const data = snap.val();
    let titulo = null, mensaje = null;
    if (data.activo === false) {
      titulo  = 'Cuenta desactivada';
      mensaje = 'Tu acceso fue desactivado. Comunícate con tu entrenador para más información.';
    }
    if (!titulo && data.validoHasta) {
      const expiry = parseEndOfLocalDay(data.validoHasta);
      if (expiry && new Date() > expiry) {
        titulo  = 'Membresía vencida';
        mensaje = `Tu suscripción venció el ${expiry.toLocaleDateString('es-CO', { day:'2-digit', month:'long', year:'numeric' })}. Renueva con tu entrenador para continuar.`;
      }
    }
    if (titulo) {
      clearInterval(_membershipCheckInterval);
      if (_swRef) off(_swRef, 'value', _swListener);
      await Swal.fire({
        icon: 'warning', title: titulo, text: mensaje,
        background: 'rgba(10,20,40,0.97)', color: '#e8f4ff',
        confirmButtonColor: '#ff4d6d', confirmButtonText: 'Entendido',
        allowOutsideClick: false, allowEscapeKey: false
      });
      sessionStorage.removeItem('saykyo_user');
      signOut(auth).finally(() => { window.location.href = 'index.html'; });
    }
  } catch(e) { console.warn('checkMembershipExpiry error', e); }
}

function setupSessionWatcher(uid) {
  if (_swRef) off(_swRef, 'value', _swListener);
  _swRef    = ref(db, `usuarios/${uid}`);
  _swBooted = false;

  // ⏱️ Verificar membresía cada 60s para detectar vencimiento automático (sin cambio en DB)
  if (_membershipCheckInterval) clearInterval(_membershipCheckInterval);
  _membershipCheckInterval = setInterval(checkMembershipExpiry, 60000);

  _swListener = onValue(_swRef, async (snap) => {
    // Primer disparo = estado actual al registrar el listener, no un cambio real
    if (!_swBooted) { _swBooted = true; return; }
    if (!snap.exists()) return;

    const data = snap.val();
    let titulo  = null;
    let mensaje = null;

    // 1. Cuenta desactivada por el admin
    if (data.activo === false) {
      titulo  = 'Cuenta desactivada';
      mensaje = 'Tu acceso fue desactivado. Comunícate con tu entrenador para más información.';
    }

    // 2. Membresía vencida — compara fin del día LOCAL para evitar falsos positivos en UTC-5
    if (!titulo && data.validoHasta) {
      const expiry = parseEndOfLocalDay(data.validoHasta);
      if (expiry && new Date() > expiry) {
        titulo  = 'Membresía vencida';
        mensaje = `Tu suscripción venció el ${expiry.toLocaleDateString('es-CO', { day:'2-digit', month:'long', year:'numeric' })}. Renueva con tu entrenador para continuar.`;
      }
    }

    if (titulo) {
      clearInterval(_membershipCheckInterval);
      off(_swRef, 'value', _swListener); // detener listener antes del logout
      await Swal.fire({
        icon: 'warning',
        title: titulo,
        text: mensaje,
        background: 'rgba(10,20,40,0.97)',
        color: '#e8f4ff',
        confirmButtonColor: '#ff4d6d',
        confirmButtonText: 'Entendido',
        allowOutsideClick: false,
        allowEscapeKey: false
      });
      sessionStorage.removeItem('saykyo_user');
      signOut(auth).finally(() => { window.location.href = 'index.html'; });
    }
  });
}
// ──────────────────────────────────────────────────────────────────────────────

// ── FIX 1: Robust save on page visibility change (app goes to background) ──
// This handles iOS Safari backgrounding, screen lock, switch app, etc.
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden' && state.sesionActiva) {
    // Force save immediately when app goes to background
    savePendingSession();
  }
});

// ── Intercept browser back button during active session ──
window.addEventListener('popstate', (e) => {
  if(window._suppressPopstate) return;
  // Case 1: back pressed while fatigue modal is open after session completed
  // Dismiss the modal cleanly (Promise resolves with null → session already saved)
  if(e.state && e.state.saykyo === 'fatigue') {
    if(typeof window._dismissFatigueModal === 'function') {
      window._dismissFatigueModal();
    } else {
      const fatigueOvl = document.querySelector('.overlay-backdrop');
      if(fatigueOvl) fatigueOvl.remove();
    }
    return;
  }
  // Case 2: back pressed while session is active (during exercise)
  // Intercept: push state back + restore exercise view
  if(state.sesionActiva && state.rutinaData) {
    history.pushState({ saykyo: 'training' }, '');
    if(state.tab !== 'entrenar') {
      state.tab = 'entrenar';
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'entrenar'));
    }
    updateSessionDot(true);
    renderEjercicioActual();
    return;
  }
});

// Push training history state whenever exercise view is shown
// so the back button is always armed during an active session
function _pushTrainingHistory() {
  if(!history.state || history.state.saykyo !== 'training') {
    history.pushState({ saykyo: 'training' }, '');
  }
}

// ── FIX 1: Save on page unload/beforeunload (browser/tab close) ──
window.addEventListener('beforeunload', () => {
  if(state.sesionActiva) {
    // Synchronous save not possible, but we trigger the async save
    savePendingSession();
  }
});

// ── FIX 1: Periodic auto-save every 30 seconds as extra safety net ──
setInterval(() => {
  if(state.sesionActiva && state.tab === 'entrenar') {
    savePendingSession();
  }
}, 30000);

// Init — esperar sesión Firebase antes de leer DB
onAuthStateChanged(auth, (user) => {
  if (!user) {
    sessionStorage.removeItem('saykyo_user');
    window.location.href = 'index.html';
    return;
  }
  if (!window._initDone) {
    window._initDone = true;
    setupUserNotifListener();
    setupSessionWatcher(user.uid); // 🔒 expulsión en tiempo real si admin cambia estado
    init();
  }
});
</script>

<a class="help-fab" id="helpFab" href="manual.html" title="Abrir manual">?</a>
<div class="help-fab-tooltip" id="helpFabTooltip">📖 Manual de uso</div>

<script>
(function(){
  const fab = document.getElementById('helpFab');
  const tip = document.getElementById('helpFabTooltip');
  const KEY = 'saykyo_fab_pos';

  function updateTooltip(){
    const r = fab.getBoundingClientRect();
    const tipW = 140;
    if(r.left > tipW + 10){
      tip.style.left = (r.left - tipW - 8)+'px';
    } else {
      tip.style.left = (r.right + 8)+'px';
    }
    tip.style.top = (r.top + r.height/2 - 16)+'px';
    tip.style.right = 'auto';
    tip.style.bottom = 'auto';
  }

  try {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if(saved) {
      const l = parseFloat(saved.l); const t = parseFloat(saved.t);
      // Validar que la posición guardada siga dentro de la pantalla actual
      if(l >= 0 && t >= 0 && l <= window.innerWidth - 48 && t <= window.innerHeight - 48) {
        fab.style.left=saved.l; fab.style.top=saved.t;
        fab.style.right='auto'; fab.style.bottom='auto';
      } else {
        // Posición fuera de pantalla → resetear a posición por defecto y limpiar
        localStorage.removeItem(KEY);
      }
      setTimeout(updateTooltip,0);
    }
  } catch(e){ try{ localStorage.removeItem(KEY); }catch(_){} }

  let dragging=false, ox=0, oy=0, moved=false;

  fab.addEventListener('mousedown', e=>{
    dragging=true; moved=false;
    const r=fab.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top;
    fab.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    moved=true;
    const x=Math.min(Math.max(e.clientX-ox,0),window.innerWidth-48);
    const y=Math.min(Math.max(e.clientY-oy,0),window.innerHeight-48);
    fab.style.left=x+'px'; fab.style.top=y+'px';
    fab.style.right='auto'; fab.style.bottom='auto';
    updateTooltip();
  });

  document.addEventListener('mouseup', ()=>{
    if(!dragging) return;
    dragging=false;
    fab.classList.remove('dragging');
    if(moved) try{ localStorage.setItem(KEY, JSON.stringify({l:fab.style.left,t:fab.style.top})); }catch(e){}
  });

  fab.addEventListener('touchstart', e=>{
    const t=e.touches[0];
    dragging=true; moved=false;
    const r=fab.getBoundingClientRect();
    ox=t.clientX-r.left; oy=t.clientY-r.top;
    fab.classList.add('dragging');
  },{passive:true});

  document.addEventListener('touchmove', e=>{
    if(!dragging) return;
    moved=true;
    const t=e.touches[0];
    const x=Math.min(Math.max(t.clientX-ox,0),window.innerWidth-48);
    const y=Math.min(Math.max(t.clientY-oy,0),window.innerHeight-48);
    fab.style.left=x+'px'; fab.style.top=y+'px';
    fab.style.right='auto'; fab.style.bottom='auto';
    e.preventDefault();
  },{passive:false});

  document.addEventListener('touchend', ()=>{
    if(!dragging) return;
    dragging=false;
    fab.classList.remove('dragging');
    if(moved) try{ localStorage.setItem(KEY, JSON.stringify({l:fab.style.left,t:fab.style.top})); }catch(e){}
  });

  fab.addEventListener('click', e=>{ if(moved){ e.preventDefault(); moved=false; } });

  updateTooltip();
  window.addEventListener('resize', updateTooltip);
})();
</script>
