// Toggle serie done for prefixed ids (biserie support)
window.toggleSerieP = (prefix, i) => {
  if(!prefix) { toggleSerie(i); return; } // normal path: use full logic
  const el = document.getElementById(`${prefix}done_${i}`);
  if(!el) return;
  if(el.dataset.toggling) return; // FIX 1: prevent blocking
  el.dataset.toggling = '1';
  setTimeout(() => { if(el) delete el.dataset.toggling; }, 500);
  
  const wasChecked = el.classList.contains('checked');
  el.classList.toggle('checked');
  const isNowChecked = !wasChecked;

  if(isNowChecked) {
    if(navigator.vibrate) navigator.vibrate(50);
    primeVoiceQueue(); // iOS audio unlock
  }

  // Autosave feedback
  showAutosaveFeedback(el);
  savePendingSession();

  // Rest timer — solo al marcar como hecha, y en serie compuesta SOLO al completar el último
  // Prefix format: 'e0_'=primero, 'e1_'=segundo... el último dispara el timer
  if(isNowChecked) {
    const prefixNum = parseInt(prefix.replace('e','').replace('_',''));
    const { mesActual=1, semanaActual=1, diaActual=1 } = state.progreso||{};
    const diaDataCheck = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[diaActual];
    const ejsDiaCheck = Object.values(diaDataCheck?.ejercicios||{});
    // Find chain length starting at ejercicioActual
    let chainLen = 1;
    let ci = state.ejercicioActual;
    while(ejsDiaCheck[ci]?.biset === true && ci + 1 < ejsDiaCheck.length) { ci++; chainLen++; }
    const isLastInChain = (prefixNum === chainLen - 1) || !prefix.startsWith('e');
    if(isLastInChain) {
      const { mesActual=1, semanaActual=1, diaActual=1 } = state.progreso||{};
      const diaData = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[diaActual];
      const ejsDia = Object.values(diaData?.ejercicios||{});
      // Use the last exercise in the chain for rest time config
      const ejIdx = state.ejercicioActual + (chainLen - 1);
      const ejConfig = ejsDia[ejIdx];
      const sc = ejConfig?.seriesConfig;
      const restSecs = (sc && sc[i] && sc[i].descanso != null) ? sc[i].descanso : (ejConfig?.descanso || 90);

      // ── Build nextInfo for the timer overlay ──
      const nextSerieIdx = i + 1;
      const totalSeries  = ejConfig?.series || 3;
      let nextInfo = null;

      if(nextSerieIdx < totalSeries) {
        // There are more series in this compound set — next is the first exercise (e0_) again
        const ejFirst     = ejsDia[state.ejercicioActual];
        const ejFirstInfo = state.ejercicios[ejFirst?.ejercicioId]||{};
        const scFirst     = ejFirst?.seriesConfig;
        const pesoFirst   = scFirst?.[nextSerieIdx]?.peso ?? ejFirst?.peso ?? null;
        const repsFirst   = scFirst?.[nextSerieIdx]
          ? `${scFirst[nextSerieIdx].repsMin}-${scFirst[nextSerieIdx].repsMax}`
          : `${ejFirst?.repsMin??'?'}-${ejFirst?.repsMax??'?'}`;
        nextInfo = { nombre: ejFirstInfo.nombre||'Ejercicio A', peso: pesoFirst, reps: repsFirst, metodo: ejFirst?.metodo||'', anotaciones: ejFirst?.anotaciones||'', isBisetSwitch: true, isNextExercise: false };
      } else {
        // All series done — next independent exercise after the chain
        const nextEjIdx  = state.ejercicioActual + chainLen;
        const nextEjConf = ejsDia[nextEjIdx];
        const nextEjInfo = nextEjConf ? (state.ejercicios[nextEjConf.ejercicioId]||{}) : null;
        if(nextEjInfo) {
          const scN   = nextEjConf?.seriesConfig;
          const pesoN = scN?.[0]?.peso ?? nextEjConf?.peso ?? null;
          const repsN = scN?.[0]
            ? `${scN[0].repsMin}-${scN[0].repsMax}`
            : `${nextEjConf?.repsMin??'?'}-${nextEjConf?.repsMax??'?'}`;
          nextInfo = { nombre: nextEjInfo.nombre||'Siguiente ejercicio', peso: pesoN, reps: repsN, metodo: nextEjConf?.metodo||'', anotaciones: nextEjConf?.anotaciones||'', isBisetSwitch: false, isNextExercise: true };
        }
      }

      startRestTimer(restSecs, nextInfo);
    }

    updateSessionDot(true);
  }
};

// ── Helper: collect series from entrenamiento form ──
function _collectSeriesData(ejConfig, ejInfo, prefix) {
  const esBiext = ejInfo.biextremidad === true;
  const n = ejConfig.series || 3;
  return Array.from({length:n}, (_,i) => {
    const base = {
      reps: +document.getElementById(`${prefix}reps_${i}`)?.value||0,
      peso: +document.getElementById(`${prefix}peso_${i}`)?.value||0,
      completada: document.getElementById(`${prefix}done_${i}`)?.classList.contains('checked')||false,
      comentario: document.getElementById(`${prefix}comentario_${i}`)?.value?.trim()||''
    };
    if(esBiext) {
      base.rirRpeIzq = +document.getElementById(`${prefix}rpe_izq_${i}`)?.value||0;
      base.rirRpeDer = +document.getElementById(`${prefix}rpe_der_${i}`)?.value||0;
      base.rirRpe = Math.round(((base.rirRpeIzq||0)+(base.rirRpeDer||0))/2);
      const repsIzqVal = +document.getElementById(`${prefix}reps_izq_${i}`)?.value;
      const repsDerVal = +document.getElementById(`${prefix}reps_der_${i}`)?.value;
      if(!isNaN(repsIzqVal)) base.repsIzq = repsIzqVal;
      if(!isNaN(repsDerVal)) base.repsDer = repsDerVal;
      if(base.repsIzq != null && base.repsDer != null) {
        base.reps = Math.round((base.repsIzq + base.repsDer) / 2);
      } else {
        base.reps = base.repsIzq ?? base.repsDer ?? 0;
      }
    } else {
      base.rirRpe = +document.getElementById(`${prefix}rpe_${i}`)?.value||0;
    }
    return base;
  });
}

function renderEjercicioActual() {
  // Arm the back button interception whenever we're in exercise view
  _pushTrainingHistory();
  const { mesActual=1, semanaActual=1, diaActual=1 } = state.progreso||{};
  const diaData = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[diaActual];
  const ejsDia = Object.values(diaData?.ejercicios||{});
  
  if(state.ejercicioActual >= ejsDia.length) {
    finalizarSesion();
    return;
  }

  const ejConfig = ejsDia[state.ejercicioActual];
  const ejInfo = state.ejercicios[ejConfig.ejercicioId]||{};
  const total = ejsDia.length;
  const current = state.ejercicioActual+1;

  // ── Método de esfuerzo del ejercicio actual ──
  const esCardio = ejConfig?.metodo === 'cardio' || ejInfo?.tipo === 'cardio';
  const _usedMetodo = ejConfig?.metodo || currentUser.metodo || 'RPE';
  const metodoLabel = _usedMetodo === 'RPE' ? 'RPE (1-10)' : 'RIR (-1→6)';
  const metodoMin   = _usedMetodo === 'RPE' ? 1 : -1;
  const metodoMax   = _usedMetodo === 'RPE' ? 10 : 6;

  // ── Serie compuesta: detectar cadena de N ejercicios enlazados por biset:true ──
  // Un ejercicio con biset:true agrupa con el siguiente; se encadenan hasta que uno NO tiene biset:true
  const _chainEjs = []; // lista de {config, info, prefix} para todos los de la cadena
  {
    let _ci = state.ejercicioActual;
    while(_ci < ejsDia.length) {
      const _cfg = ejsDia[_ci];
      const _inf = state.ejercicios[_cfg?.ejercicioId]||{};
      _chainEjs.push({ config: _cfg, info: _inf, prefix: 'e'+(_ci - state.ejercicioActual)+'_', idx: _ci });
      if(_cfg?.biset === true && _ci + 1 < ejsDia.length) { _ci++; } else { break; }
    }
  }
  const esBiset = _chainEjs.length > 1;
  // Aliases for backward compatibility with code below
  const ejConfigB = _chainEjs[1]?.config || null;
  const ejInfoB   = _chainEjs[1]?.info   || null;

  // ── Compute display step numbers (each chain counts as 1 step) ──
  const displayTotal = (() => {
    let t = 0, i = 0;
    while(i < ejsDia.length) {
      t++;
      while(ejsDia[i]?.biset === true && i + 1 < ejsDia.length) i++;
      i++;
    }
    return t;
  })();
  const displayCurrent = (() => {
    let c = 0, i = 0;
    while(i <= state.ejercicioActual) {
      c++;
      while(ejsDia[i]?.biset === true && i + 1 < ejsDia.length && i < state.ejercicioActual) i++;
      i++;
    }
    return c;
  })();
  const pct = Math.round(((displayCurrent-1)/displayTotal)*100);

  // Last session data for this exercise (A = first in chain)
  const ultimoReg = getUltimoRegistro(ejConfig.ejercicioId);
  let ultimoBanner = '';
  if(ultimoReg) {
    const { series, fecha, mes, semana, dia } = ultimoReg;
    const esBiextUlt = series.some(s => s.rirRpeIzq != null);

    const filas = series.map((s, i) => {
      const rpeCell = esBiextUlt
        ? `<td style="${tdSt}"><span style="color:#00e5a0">${s.repsIzq??s.reps??'—'}</span></td><td style="${tdSt}"><span style="color:#ff6b35">${s.repsDer??s.reps??'—'}</span></td><td style="${tdSt}"><span style="color:#00e5a0">${s.rirRpeIzq??'—'}</span></td><td style="${tdSt}"><span style="color:#ff6b35">${s.rirRpeDer??'—'}</span></td>`

    // Build "última vez" for each exercise in chain
    const buildUltBanner = (cfg, inf, colorBase, label) => {
      const reg = getUltimoRegistro(cfg.ejercicioId);
      if(!reg) return '';
      const { series: sr, fecha: fe, mes: me, semana: se2, dia: di } = reg;

      const filas = sr.map((s,i) => '<tr style="border-bottom:1px solid rgba(255,255,255,0.05)">'
        + '<td style="' + tdS + ';color:' + colorBase + '0.8)">' + (i+1) + '</td>'

        + '<td style="' + tdS + ';color:' + colorBase + '0.8)">' + (s.rirRpe ?? '—') + '</td>'
        + '</tr>').join('');
      return '<div style="background:' + colorBase + '0.07);border:1px solid ' + colorBase + '0.25);border-radius:12px;padding:10px 12px;margin-bottom:10px">'
        + '<div style="font-size:0.62rem;color:' + colorBase + '0.9);font-weight:700;margin-bottom:6px">' + label + ' Última vez — M' + me + '·S' + se2 + '·D' + di + ' · ' + fStr + '</div>'
        + '<table style="width:100%;border-collapse:collapse"><thead><tr>'

        + '</tr></thead><tbody>' + filas + '</tbody></table></div>';
    };

    // Build series rows (interleaved: 1A+1B+1C..., 2A+2B+2C...)
    const buildSerieRow = (cfg, inf, pfx, colorBase, label, i) => {
      const sv = (f, fb) => svFor(cfg, i, f, fb);
      const descanso = svFor(cfg, i, 'descanso', cfg?.descanso||90);
      return '<div style="background:' + colorBase + '0.04);padding:10px 14px;border-bottom:1px solid ' + colorBase + '0.1)">'
        + '<div style="font-size:0.6rem;color:' + colorBase + '0.9);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px">' + label + ' ' + (inf.nombre||'Ejercicio') + '</div>'
        + '<div class="serie-inputs">'
        + '<div class="serie-field"><label>Reps</label><input type="number" id="' + pfx + 'reps_' + i + '" placeholder="' + sv('repsMin',0) + '-' + sv('repsMax',0) + '" min="0" value="' + sv('repsMin',0) + '"></div>'
        + '<div class="serie-field"><label>Peso (kg)</label><input type="number" id="' + pfx + 'peso_' + i + '" placeholder="' + sv('peso',0) + '" min="0" step="0.5" value="' + sv('peso',0) + '"></div>'
        + '<div class="serie-field"><label style="color:' + colorBase + '0.9)">' + metLbl + '</label><input type="number" id="' + pfx + 'rpe_' + i + '" placeholder="' + sv('rirRpe',0) + '" min="' + metMin + '" max="' + metMax + '" value="' + sv('rirRpe',0) + '" style="border-color:' + colorBase + '0.3);background:' + colorBase + '0.05)"></div>'
        + '</div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">'
        + '<input type="text" id="' + pfx + 'comentario_' + i + '" placeholder="💬 Comentario..." style="flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 10px;color:var(--text-muted);font-family:\'Exo 2\',sans-serif;font-size:0.78rem;outline:none;margin-right:10px">'
        + '<button class="serie-done" id="' + pfx + 'done_' + i + '" onclick="toggleSerieP(\'' + pfx + '\',' + i + ')" style="border-color:' + colorBase + '0.5)">✓ ' + label + '</button>'
        + '</div></div>';
    };

    // Build info cards header
    const infoCardsHtml = _chainEjs.map((e, n) => {
      const col = _chainColors[n % _chainColors.length];
      const lbl = _chainLabels[n] || ('#'+(n+1));
      return '<div style="background:' + col + '0.06);border:1px solid ' + col + '0.25);border-radius:14px;padding:12px 14px">'

        + '<span class="meta-pill" style="font-size:0.7rem">🔢 ' + (e.config?.repsMin||'?') + '-' + (e.config?.repsMax||'?') + '</span>'

      const col = _chainColors[n % _chainColors.length];
      const lbl = _chainLabels[n] || ('#'+(n+1));
      return buildUltBanner(e.config, e.info, col, lbl);
    }).join('');

    // Build interleaved series
    let seriesHtml = '';
    for(let si = 0; si < nSeries; si++) {
      const lastEj = _chainEjs[nInChain - 1];
      const scLast = lastEj.config?.seriesConfig;
      const descansoSeg = (scLast && scLast[si] && scLast[si].descanso != null) ? scLast[si].descanso : (lastEj.config?.descanso||90);

        + '<div style="background:rgba(255,107,53,0.08);padding:8px 14px;display:flex;align-items:center;justify-content:space-between">'

        + _chainEjs.map((e, n) => {
            const col = _chainColors[n % _chainColors.length];
            const lbl = _chainLabels[n] || ('#'+(n+1));
            return buildSerieRow(e.config, e.info, e.prefix, col, lbl, si);
          }).join('')
        + '</div>';
    }

    const nLabel = nInChain === 2 ? 'Biserie' : nInChain === 3 ? 'Triserie' : `Serie compuesta (${nInChain})`;

        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div style="background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.3);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:0.78rem;color:#ff6b35;font-weight:600">
        🔗 ${nLabel} — Alterna: ${_chainLabels.slice(0,nInChain).join(' → ')} → descanso → siguiente serie
      </div>

      <div style="display:grid;grid-template-columns:${gridCols};gap:10px;margin-bottom:14px">
        ${infoCardsHtml}
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
        ${ultimasVecesHtml}
      </div>

      <div class="glass-card">
        <div class="card-title">📊 Series (alterna ${_chainLabels.slice(0,nInChain).join(' → ')} → descanso)</div>

        <button class="btn btn-success btn-full" onclick="completarEjercicio()">✅ Completar ${nLabel.toLowerCase()}</button>
        ${state.ejercicioActual>0?`<button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="ejercicioAnterior()">← Ejercicio anterior</button>`:''}
      </div>
    `
  } else {
    // ── NORMAL single exercise layout ──
    const seriesRows = _buildSeriesRows(ejConfig, ejInfo, '', metodoLabel, metodoMin, metodoMax);

    p.innerHTML = `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:0.8rem;color:var(--text-muted)">Ejercicio ${displayCurrent} de ${displayTotal}</span>
          <span style="font-size:0.8rem;color:var(--primary);font-weight:600">${pct}% completado</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="training-card">
        <div class="training-video" id="trainingVideoWrap">
          ${ejInfo.urlVideo?`<iframe id="trainingVideoIframe" src="${ejInfo.urlVideo}?autoplay=0&mute=0&controls=1" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>}`:`<div class="no-video"><div style="font-size:3rem">🏋️</div><div>Sin video disponible</div></div>`}
        </div>
        <div class="training-info">
          <div class="training-title">${ejInfo.nombre||'Ejercicio'}</div>
          <div class="training-meta">
            <span class="meta-pill">📦 ${ejConfig.series} series</span>
            <span class="meta-pill">🔢 ${ejConfig.repsMin}-${ejConfig.repsMax} reps</span>
            <span class="meta-pill">⚖️ ${ejConfig.peso}kg</span>
            <span class="meta-pill">${(currentUser.metodo === 'RPE' || esCardio) ? 'RPE' : currentUser.metodo} ${ejConfig.rirRpe}</span>
            <span class="meta-pill">⏱️ ${ejConfig.seriesConfig ? 'descanso por serie' : ejConfig.descanso+'s descanso'}</span>
            ${ejConfig.metodo?`<span class="meta-pill" style="background:rgba(123,47,255,0.15);border-color:rgba(123,47,255,0.35);color:#c084fc">⚡ ${ejConfig.metodo}</span>`:''}
          </div>
          ${ejConfig.anotaciones?`<div style="background:rgba(255,210,0,0.08);border:1px solid rgba(255,210,0,0.15);border-radius:10px;padding:10px;font-size:0.82rem;color:#ffd60a;margin-bottom:14px">📝 ${ejConfig.anotaciones}</div>`:''}
          ${ejInfo.descripcion?`<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px">${ejInfo.descripcion}</div>`:''}
        </div>
      </div>

      ${ultimoBanner}
      <div class="glass-card">
        <div class="card-title">📊 Registrar series</div>
        <div class="series-list">${seriesRows}</div>
        <button class="btn btn-success btn-full" onclick="completarEjercicio()">
          ✅ Completar ejercicio ${ejConfig.biextremidad?'(Cada lado)':''}

        ${state.ejercicioActual>0?`<button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="ejercicioAnterior()">← Ejercicio anterior</button>`:''}
      </div>
    `;
  }

  // Restaurar snapshot si viene de una sesión pendiente recuperada (retomar sesión)
  function _applySnap(prefix, snap, info) {
    if(!snap || !Array.isArray(snap)) return;
    snap.forEach((s, i) => {
      const repsEl = document.getElementById(`${prefix}reps_${i}`);
      const pesoEl = document.getElementById(`${prefix}peso_${i}`);
      const doneEl = document.getElementById(`${prefix}done_${i}`);
      const comEl  = document.getElementById(`${prefix}comentario_${i}`);
      if(repsEl && s.reps) repsEl.value = s.reps;
      if(pesoEl && s.peso) pesoEl.value = s.peso;
      if(comEl  && s.comentario) comEl.value = s.comentario;
      if(doneEl && s.completada) doneEl.classList.add('checked');
      if(info?.biextremidad) {
        const izqEl = document.getElementById(`${prefix}rpe_izq_${i}`);
        const derEl = document.getElementById(`${prefix}rpe_der_${i}`);
        if(izqEl && s.rirRpeIzq) izqEl.value = s.rirRpeIzq;
        if(derEl && s.rirRpeDer) derEl.value = s.rirRpeDer;
        const repsIzqEl = document.getElementById(`${prefix}reps_izq_${i}`);
        const repsDerEl = document.getElementById(`${prefix}reps_der_${i}`);
        if(repsIzqEl && s.repsIzq != null) repsIzqEl.value = s.repsIzq;
        if(repsDerEl && s.repsDer != null) repsDerEl.value = s.repsDer;
      } else {
        const rpeEl = document.getElementById(`${prefix}rpe_${i}`);
        if(rpeEl && s.rirRpe != null) rpeEl.value = s.rirRpe;
      }
    });
  }

  // Prioridad 1: snapshot de sesión pendiente recuperada (retomar sesión)
  const snap  = state._pendingSeriesSnapshot;
  const snapB = state._pendingSeriesSnapshotB;
  const snapChain = state._pendingSeriesSnapshotChain;
  if(snap && Array.isArray(snap)) {
    if(esBiset) {
      if(snapChain && Array.isArray(snapChain)) {
        // N-chain: apply each exercise in chain with e0_, e1_, e2_... prefixes
        _chainEjs.forEach((e, n) => {
          if(snapChain[n]) _applySnap('e' + n + '_', snapChain[n], e.info);
        });
      } else {
        // Fallback for old saved data with ea_/eb_ prefixes (2-exercise only)
        _applySnap('e0_', snap,  ejInfo);
        if(snapB) _applySnap('e1_', snapB, ejInfoB);
      }
    } else {
      _applySnap('', snap, ejInfo);
    }
    state._pendingSeriesSnapshot       = null;
    state._pendingSeriesSnapshotB      = null;
    state._pendingSeriesSnapshotChain  = null;
  } else {
    // Prioridad 2: datos guardados al navegar entre ejercicios (ir atrás/adelante)
    // Esto preserva el avance cuando el usuario se salta un ejercicio y luego regresa
    const savedComp = state.sesionActiva?.ejerciciosCompletados;
    if(savedComp) {
      const savedA = savedComp[state.ejercicioActual];
      if(savedA && savedA.series) {
        if(esBiset) {
          // Apply all N exercises in chain
          _chainEjs.forEach((e, n) => {
            const savedN = savedComp[state.ejercicioActual + n];
            if(savedN && savedN.series) _applySnap('e' + n + '_', savedN.series, e.info);
          });
        } else {
          _applySnap('', savedA.series, ejInfo);
        }
      }
    }
  }

  // Marcar el contenedor con el índice del ejercicio renderizado, para que
  // savePendingSession pueda verificar que el DOM corresponde al ejercicio actual.
  const _mainPage = document.getElementById('mainPage');
  if(_mainPage) _mainPage.dataset.ejIdx = String(state.ejercicioActual);

  // Auto-save a Firebase en cada cambio de input
  document.querySelectorAll('.serie-field input, .serie-row input[type="text"]').forEach(input => {
    input.addEventListener('change', () => savePendingSession(), { passive: true });
  });
}

window.toggleSerie = (i) => {
  const btn = document.getElementById(`done_${i}`);
  if(!btn) return; // FIX 1: guard against null ref
  if(btn.dataset.toggling) return; // FIX 1: prevent double-tap blocking
  btn.dataset.toggling = '1';
  setTimeout(() => { if(btn) delete btn.dataset.toggling; }, 500);
  
  const wasChecked = btn.classList.contains('checked');
  btn.classList.toggle('checked');
  const isNowChecked = !wasChecked;

  // 1. Haptic feedback (mobile) + desbloquear audio iOS sincrónicamente
  if(isNowChecked) {
    if(navigator.vibrate) navigator.vibrate(50);
    primeVoiceQueue(); // debe estar en el call-stack síncrono del tap
  }

  // 2. Autosave micro-feedback + guardar en Firebase
  showAutosaveFeedback(btn);
  savePendingSession();

  // 3. Rest timer — only when marking as done
  if(isNowChecked) {
    const { mesActual=1, semanaActual=1, diaActual=1 } = state.progreso||{};
    const diaData = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[diaActual];
    const ejConfig = Object.values(diaData?.ejercicios||{})[state.ejercicioActual];
    const ejsDia2  = Object.values(diaData?.ejercicios||{});
    const sc = ejConfig?.seriesConfig;
    const restSecs = (sc && sc[i] && sc[i].descanso != null) ? sc[i].descanso : (ejConfig?.descanso || 90);
    // Build nextInfo for normal toggle (non-biset path)
    const nxtSerieIdx = i + 1;
    const totSeries2  = ejConfig?.series || 3;
    let nextInfo2 = null;
    if(nxtSerieIdx < totSeries2) {
      const pesoN2 = sc?.[nxtSerieIdx]?.peso ?? ejConfig?.peso ?? null;
      const repsN2 = sc?.[nxtSerieIdx] ? `${sc[nxtSerieIdx].repsMin}-${sc[nxtSerieIdx].repsMax}` : `${ejConfig?.repsMin??'?'}-${ejConfig?.repsMax??'?'}`;
      const ejInfo2b = state.ejercicios[ejConfig?.ejercicioId]||{};
      nextInfo2 = { nombre: ejInfo2b.nombre||'', peso: pesoN2, reps: repsN2, metodo: ejConfig?.metodo||'', anotaciones: '', isBisetSwitch: false, isNextExercise: false };
    } else {
      const nxtEjConf = ejsDia2[state.ejercicioActual + 1];
      const nxtEjInfo = nxtEjConf ? (state.ejercicios[nxtEjConf.ejercicioId]||{}) : null;
      if(nxtEjInfo) {
        const scN2 = nxtEjConf?.seriesConfig;
        const pesoN2 = scN2?.[0]?.peso ?? nxtEjConf?.peso ?? null;
        const repsN2 = scN2?.[0] ? `${scN2[0].repsMin}-${scN2[0].repsMax}` : `${nxtEjConf?.repsMin??'?'}-${nxtEjConf?.repsMax??'?'}`;
        nextInfo2 = { nombre: nxtEjInfo.nombre||'Siguiente ejercicio', peso: pesoN2, reps: repsN2, metodo: nxtEjConf?.metodo||'', anotaciones: nxtEjConf?.anotaciones||'', isBisetSwitch: false, isNextExercise: true };
      }
    }
    startRestTimer(restSecs, nextInfo2);

    // 4. Session-in-progress indicator
    updateSessionDot(true);
  }
};

let _restTimerInterval = null;

// ── AUDIO ENGINE — Web Audio API ──
// Lazy-init: el contexto se crea la primera vez que el usuario interactúa
let _audioCtx = null;

function getAudioCtx() {
  if(!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

// Sonido de tick sofisticado: oscilador sinusoidal + filtro paso-alto + envolvente suave
// freq    → frecuencia base (Hz)
// gain    → volumen pico (0-1)
// duration→ duración total del sonido (segundos)
// attack  → tiempo de subida (segundos)
// decay   → tiempo de caída (segundos)
function playTick(freq = 880, gain = 0.18, duration = 0.08, attack = 0.004, decay = 0.06) {
  const ctx = getAudioCtx();
  if(!ctx) return;

  // Reanudar contexto si estaba suspendido (política autoplay)
  if(ctx.state === 'suspended') ctx.resume();

  const now = ctx.currentTime;

  // Oscilador principal — senoidal pura (suave, no agresiva)
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  // Ligera caída de frecuencia para dar sensación de "golpe" suave
  osc.frequency.exponentialRampToValueAtTime(freq * 0.85, now + duration);

  // Oscilador de armónico — da cuerpo sin ser molesto
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2, now);
  osc2.frequency.exponentialRampToValueAtTime(freq * 1.6, now + duration);

  // Ganancia del armónico (más suave que el principal)
  const gainArmonic = ctx.createGain();
  gainArmonic.gain.setValueAtTime(0, now);
  gainArmonic.gain.linearRampToValueAtTime(gain * 0.3, now + attack);
  gainArmonic.gain.exponentialRampToValueAtTime(0.0001, now + decay * 0.6);

  // Envolvente principal: attack suave → decay exponencial
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(gain, now + attack);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  // Filtro paso-alto para quitar baja frecuencia (evita "bum" molesto)
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 200;
  filter.Q.value = 0.7;

  // Compresor suave para evitar clipping
  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -18;
  compressor.knee.value = 6;
  compressor.ratio.value = 3;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.08;

  // Conectar grafo de audio
  osc.connect(gainNode);
  osc2.connect(gainArmonic);
  gainNode.connect(filter);
  gainArmonic.connect(filter);
  filter.connect(compressor);
  compressor.connect(ctx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.01);
  osc2.start(now);
  osc2.stop(now + duration + 0.01);
}

// Tick normal de descanso: tono suave y bajo (528 Hz — "healing frequency")
function playRestTick() {
  playTick(528, 0.14, 0.09, 0.005, 0.07);
}

// Tick de cuenta regresiva final (últimos 5s): tono más agudo y brillante
// idx 0=5s, 1=4s, 2=3s, 3=2s, 4=1s → frecuencia y velocidad suben progresivamente
function playUrgentTick(idx) {
  // Escala: 880 → 1047 → 1175 → 1319 → 1480 Hz (notas A5→C6→D6→E6→F#6)
  const freqs = [880, 1047, 1175, 1319, 1480];
  const gains = [0.20, 0.22, 0.24, 0.26, 0.30];
  const freq = freqs[Math.min(idx, 4)];
  const gain = gains[Math.min(idx, 4)];
  playTick(freq, gain, 0.07, 0.003, 0.055);
}

// Fanfarria de finalización: 3 notas ascendentes
function playFinishChime() {
  const ctx = getAudioCtx();
  if(!ctx) return;
  if(ctx.state === 'suspended') ctx.resume();
  // Notas: E5 → G5 → B5 (acorde mayor ascendente)
  const notes = [659, 784, 988];
  notes.forEach((freq, i) => {
    setTimeout(() => playTick(freq, 0.28, 0.22, 0.006, 0.18), i * 140);
  });
  // Después del chime, leer el mensaje de pantalla
  setTimeout(() => speakText('¡Sigamos!'), 500);
}

// ══════════════════════════════════════════════
// VOZ — compatible Safari iOS + Android Chrome
// ══════════════════════════════════════════════
// Safari iOS requiere que speechSynthesis.speak() se invoque
// dentro del call-stack SÍNCRONO de un gesto táctil.
// Solución: primeVoiceQueue() se llama desde toggleSerie()
// (el tap del usuario). Hace speak+pause+cancel en sync,
// "desbloqueando" el audio en iOS. Luego speakText() ya puede
// llamar speak() desde setTimeout sin restricciones.

let _bestVoice   = null;
let _voicesReady = false;
let _iosUnlocked = false;

const VOICE_TEXTS = [
  'Recupera la respiraci\u00f3n',
  'Descansa, lo mereces',
  'Casi listo',
  'Prep\u00e1rate',
  '¡Sigamos!',
];

function _stripEmoji(s) {
  return s.replace(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,'').trim();
}

function _pickVoice() {
  if(!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  const order = [
    v => v.name.includes('Google') && /es-(MX|CO|AR|CL|PE|VE|US)/i.test(v.lang),
    v => v.name.includes('Google') && /es/i.test(v.lang),
    v => /es-(MX|CO|AR|CL|PE|US)/i.test(v.lang) && v.localService,
    v => /es/i.test(v.lang) && v.localService,
    v => /es-(MX|CO|AR|CL|PE|US)/i.test(v.lang),
    v => /es/i.test(v.lang),
  ];
  for(const t of order){ const m=voices.find(t); if(m) return m; }
  return null;
}

function initVoices() {
  const load = () => {
    const v = window.speechSynthesis.getVoices();
    if(!v.length) return false;
    _bestVoice = _pickVoice();
    _voicesReady = true;
    return true;
  };
  if(!load()) window.speechSynthesis.onvoiceschanged = () => load();
}

function _makeUtter(text) {
  const clean = _stripEmoji(text);
  if(!clean) return null;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang    = 'es-MX';
  u.rate    = 1.07;
  u.pitch   = 1.06;
  u.volume  = 1.0;
  const v   = _bestVoice || _pickVoice();
  if(v) u.voice = v;
  return u;
}

// Debe llamarse SINC\u00d3NICAMENTE desde el handler del tap del usuario.
// En iOS Safari hace speak+pause+cancel de una utterance dummy,
// lo que "desbloquea" el sistema de audio para llamadas futuras.
function primeVoiceQueue() {
  if(!window.speechSynthesis || _iosUnlocked) return;
  const u = _makeUtter('ok');
  if(!u) return;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
  window.speechSynthesis.pause();
  window.speechSynthesis.cancel();
  _iosUnlocked = true;
}

function speakText(rawText, delayMs = 0) {
  if(!window.speechSynthesis) return;
  const clean = _stripEmoji(rawText);
  if(!clean) return;
  const fire = () => {
    window.speechSynthesis.cancel();
    setTimeout(() => {
      const u = _makeUtter(clean);
      if(u) window.speechSynthesis.speak(u);
    }, 55);
  };
  if(delayMs > 0) setTimeout(fire, delayMs);
  else fire();
}

if(window.speechSynthesis) initVoices();

function startRestTimer(totalSecs, nextInfo) {
  if(_restTimerInterval) { clearInterval(_restTimerInterval); _restTimerInterval = null; }
  const existing = document.getElementById('restTimerToast');
  if(existing) existing.remove();
  const existingOvl = document.getElementById('restTimerOverlay');
  if(existingOvl) existingOvl.remove();

  let remaining = totalSecs;
  const endTime = Date.now() + totalSecs * 1000; // anchor to wall clock for iOS Safari
  // r=95, circumference
  const R = 95;
  const C = 2 * Math.PI * R;

  // Color states: normal → warm → urgent → done
  const getColors = (rem, tot) => {
    const pct = rem / tot;
    if(pct > 0.5)  return { color:'#00c8ff', glow:'rgba(0,200,255,0.55)' };
    if(pct > 0.25) return { color:'#ffd60a', glow:'rgba(255,214,10,0.55)' };
    return               { color:'#ff4d6d', glow:'rgba(255,77,109,0.6)' };
  };

  const getMsg = (rem, tot) => {
    const pct = rem / tot;
    if(pct > 0.75) return 'Recupera la respiración 💨';
    if(pct > 0.45) return 'Descansa, lo mereces 🧘';
    if(pct > 0.15) return 'Casi listo... 💪';
    if(rem > 0)    return '¡Prepárate! 🔥';
    return '¡A por la siguiente serie! 🚀';
  };

  const { color, glow } = getColors(remaining, totalSecs);
  const offset = C * (1 - remaining / totalSecs);

  const ovl = document.createElement('div');
  ovl.id = 'restTimerOverlay';
  ovl.innerHTML = `
    <div class="rt-label">Tiempo de descanso</div>
    <div class="rt-series-badge">✅ Serie completada</div>

    <div class="rt-ring-wrap" id="rtRingWrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="rt-ring-bg"    cx="110" cy="110" r="${R}"/>
        <circle class="rt-ring-track" cx="110" cy="110" r="${R}"/>
        <circle class="rt-ring-inner" id="rtRingInner" cx="110" cy="110" r="${R-18}"
          stroke-dasharray="${2*Math.PI*(R-18)}" stroke-dashoffset="${2*Math.PI*(R-18)*(1-remaining/totalSecs)}"/>
        <circle class="rt-ring-fill"  id="rtRingFill"  cx="110" cy="110" r="${R}"
          stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="rt-number">
        <span class="rt-count" id="rtCount">${remaining}</span>
        <span class="rt-secs-label">segundos</span>
      </div>
    </div>

    <div class="rt-msg" id="rtMsg">${getMsg(remaining, totalSecs)}</div>

    <div class="rt-progress-bar">
      <div class="rt-progress-fill" id="rtProgressFill" style="width:${(remaining/totalSecs)*100}%"></div>
    </div>

    ${nextInfo ? `<div style="background:rgba(255,255,255,0.04);border:1px solid ${nextInfo.isBisetSwitch?'rgba(255,107,53,0.35)':'rgba(0,200,255,0.25)'};border-radius:16px;padding:14px 18px;margin-top:16px;width:90%;max-width:320px;text-align:left">
      <div style="font-size:0.6rem;color:${nextInfo.isBisetSwitch?'#ff6b35':'var(--primary)'};text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px">
        ${nextInfo.isBisetSwitch ? '🔗 Siguiente en la biserie' : nextInfo.isNextExercise ? '⏭️ Siguiente ejercicio' : '⏭️ Siguiente serie'}
      </div>
      <div style="font-weight:800;font-size:1rem;margin-bottom:8px;color:#e8f4ff">${nextInfo.nombre}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${nextInfo.reps ? `<div style="background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25);border-radius:10px;padding:6px 12px;font-size:0.8rem;font-weight:700;color:#00e5a0">🔢 ${nextInfo.reps}</div>` : ''}
        ${nextInfo.peso !== null ? `<div style="background:rgba(0,200,255,0.12);border:1px solid rgba(0,200,255,0.35);border-radius:10px;padding:6px 12px;font-size:1.1rem;font-weight:900;color:#00c8ff">⚖️ ${nextInfo.peso} kg</div>` : ''}
        ${nextInfo.metodo ? `<div style="background:rgba(123,47,255,0.1);border:1px solid rgba(123,47,255,0.25);border-radius:10px;padding:6px 12px;font-size:0.8rem;color:#a78bfa">${nextInfo.metodo}</div>` : ''}
      </div>
      ${nextInfo.anotaciones ? `<div style="margin-top:8px;font-size:0.75rem;color:#ffd60a;border-top:1px solid rgba(255,255,255,0.07);padding-top:6px">📝 ${nextInfo.anotaciones}</div>` : ''}
    </div>` : ''}
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="rt-skip" onclick="skipRestTimer()">Saltar descanso</button>
      <button class="rt-skip" onclick="showSessionMapOverlay()" style="background:rgba(0,200,255,0.08);border-color:rgba(0,200,255,0.25);color:rgba(0,200,255,0.8)">🗺️ Ver sesión</button>
    </div>
  `;

  // Apply initial color via CSS variables
  ovl.style.setProperty('--rt-color', color);
  ovl.style.setProperty('--rt-glow',  glow);
  document.body.appendChild(ovl);

  // iOS Safari: al volver del fondo, forzar resync inmediato del contador
  const _restVisibilityHandler = () => {
    if(document.visibilityState === 'visible') {
      // Also save pending session when returning to the app
      savePendingSession();
      const synced = Math.max(0, Math.round((endTime - Date.now()) / 1000));
      remaining = synced;
      const countEl = document.getElementById('rtCount');
      const progressEl = document.getElementById('rtProgressFill');
      const overlay = document.getElementById('restTimerOverlay');
      if(countEl) countEl.textContent = remaining > 0 ? remaining : '✓';
      if(progressEl) progressEl.style.width = `${Math.max(0,(remaining/totalSecs)*100)}%`;
      if(remaining <= 0 && overlay) {
        clearInterval(_restTimerInterval); _restTimerInterval = null;
        document.removeEventListener('visibilitychange', _restVisibilityHandler);
        if(navigator.vibrate) navigator.vibrate([100,50,150]);
        overlay.classList.add('rt-done');
        overlay.style.setProperty('--rt-color','#00e5a0');
        overlay.style.setProperty('--rt-glow','rgba(0,229,160,0.6)');
        if(progressEl) progressEl.style.width = '0%';
        setTimeout(() => { const o=document.getElementById('restTimerOverlay'); if(o){o.classList.add('rt-exit');setTimeout(()=>o.remove(),320);} }, 1200);
      }
    }
  };
  document.addEventListener('visibilitychange', _restVisibilityHandler);
  // Limpiar el listener si se salta el timer
  const _origSkip = window.skipRestTimer;
  window.skipRestTimer = () => {
    document.removeEventListener('visibilitychange', _restVisibilityHandler);
    if(_restTimerInterval) { clearInterval(_restTimerInterval); _restTimerInterval = null; }
    const o = document.getElementById('restTimerOverlay');
    if(o) { o.classList.add('rt-exit'); setTimeout(() => o.remove(), 300); }
  };

  _restTimerInterval = setInterval(() => {
    const newRemaining = Math.max(0, Math.round((endTime - Date.now()) / 1000));
    const ticked = newRemaining < remaining;
    remaining = newRemaining;

    // ── Audio tick (solo cuando el segundo realmente avanzó) ──
    if(ticked) {
      if(remaining > 0) {
        if(remaining <= 5) {
          playUrgentTick(5 - remaining);
        } else {
          playRestTick();
        }
      } else {
        playFinishChime();
      }

      // ── Voz: hablar cuando el mensaje de pantalla cambia, 350ms después del tick ──
      if(remaining > 0) {
        const prevMsg = getMsg(remaining + 1, totalSecs);
        const currMsg = getMsg(remaining, totalSecs);
        if(currMsg !== prevMsg) {
          speakText(currMsg, 350);
        }
      }
    }

    const countEl     = document.getElementById('rtCount');
    const ringFill    = document.getElementById('rtRingFill');
    const ringInner   = document.getElementById('rtRingInner');
    const msgEl       = document.getElementById('rtMsg');
    const progressEl  = document.getElementById('rtProgressFill');
    const ringWrap    = document.getElementById('rtRingWrap');
    const overlay     = document.getElementById('restTimerOverlay');

    if(!countEl || !overlay) { clearInterval(_restTimerInterval); return; }

    // Update number with pop animation
    countEl.textContent = remaining > 0 ? remaining : '✓';
    countEl.style.animation = 'none';
    void countEl.offsetWidth; // reflow
    countEl.style.animation = 'rtCountPop 0.25s cubic-bezier(0.34,1.56,0.64,1)';

    // Update ring
    const newOffset = C * (1 - remaining / totalSecs);
    if(ringFill) ringFill.style.strokeDashoffset = newOffset;
    if(ringInner) ringInner.style.strokeDashoffset = 2*Math.PI*(R-18) * (1 - remaining/totalSecs);

    // Update progress bar
    if(progressEl) progressEl.style.width = `${Math.max(0, (remaining/totalSecs)*100)}%`;

    // Update message
    if(msgEl) msgEl.textContent = getMsg(remaining, totalSecs);

    // Update colors based on urgency
    const { color: c, glow: g } = getColors(remaining, totalSecs);
    overlay.style.setProperty('--rt-color', c);
    overlay.style.setProperty('--rt-glow',  g);

    // Urgent pulse when <= 10s
    if(ringWrap) ringWrap.classList.toggle('rt-urgent', remaining <= 10 && remaining > 0);

    if(remaining <= 0) {
      clearInterval(_restTimerInterval);
      _restTimerInterval = null;
      document.removeEventListener('visibilitychange', _restVisibilityHandler);
      if(navigator.vibrate) navigator.vibrate([100, 50, 150]);

      overlay.classList.add('rt-done');
      overlay.style.setProperty('--rt-color', '#00e5a0');
      overlay.style.setProperty('--rt-glow',  'rgba(0,229,160,0.6)');
      if(ringWrap) ringWrap.classList.remove('rt-urgent');
      if(progressEl) progressEl.style.width = '0%';

      setTimeout(() => {
        const o = document.getElementById('restTimerOverlay');
        if(o) {
          o.classList.add('rt-exit');
          setTimeout(() => o.remove(), 320);
        }
      }, 1200);
    }
  }, 1000);
}

      const res = await Swal.fire({
        icon:'warning', title:'¿Sin series completadas?',
        text:'No marcaste ninguna serie como hecha. ¿Continuar igual?',
        showCancelButton:true, confirmButtonText:'Sí, continuar', cancelButtonText:'Volver',
        background:'rgba(10,20,40,0.95)', color:'#e8f4ff', confirmButtonColor:'#00c8ff'
      });
      if(!res.isConfirmed) return;
    }
    if(!state.sesionActiva) { console.error('sesionActiva undefined'); return; }
    if(!state.sesionActiva.ejerciciosCompletados) state.sesionActiva.ejerciciosCompletados = {};
    _compChain.forEach((ejI, n) => {
      const cfg = ejsDia[ejI];
      state.sesionActiva.ejerciciosCompletados[ejI] = { ejercicioId: cfg.ejercicioId, series: chainSeriesAll[n] };
    });
    state.ejercicioActual += _compChain.length;
  } else {
    const series = _collectSeriesData(ejConfig, ejInfo2, '');
    allSeries = series;
    const alguenCompleta = series.some(s => s.completada);
    if(!alguenCompleta) {
      const res = await Swal.fire({
        icon:'warning', title:'¿Sin series completadas?',
        text:'No marcaste ninguna serie como hecha. ¿Continuar igual?',
        showCancelButton:true, confirmButtonText:'Sí, continuar', cancelButtonText:'Volver',
        background:'rgba(10,20,40,0.95)', color:'#e8f4ff', confirmButtonColor:'#00c8ff'
      });
      if(!res.isConfirmed) return;
    }
    if(!state.sesionActiva) { console.error('completarEjercicio: sesionActiva is undefined'); return; }
    if(!state.sesionActiva.ejerciciosCompletados) state.sesionActiva.ejerciciosCompletados = {};
    state.sesionActiva.ejerciciosCompletados[state.ejercicioActual] = { ejercicioId: ejConfig.ejercicioId, series };
    state.ejercicioActual++;
  }

  // Guardar progreso en Firebase tras completar cada ejercicio.
  // IMPORTANT: savePendingSession is called AFTER renderEjercicioActual so it captures
  // the new exercise's DOM (clean/blank) and not the old exercise's completed series.
  // Calling it before renderEjercicioActual would save the old DOM under the new ejercicioActual
  // index, causing wrong values/ticks to appear when resuming.
  renderEjercicioActual();
  setTimeout(() => savePendingSession(), 200);
};

window.ejercicioAnterior = () => {
  const { mesActual=1, semanaActual=1, diaActual=1 } = state.progreso||{};
  const diaData = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[diaActual];
  const ejsDia = Object.values(diaData?.ejercicios||{});

  // ── Guardar datos del formulario actual ANTES de retroceder ──
  // (para que al volver a este ejercicio se restauren los valores)
  const ejConfig = ejsDia[state.ejercicioActual];
  if(ejConfig) {
    const ejInfo = state.ejercicios[ejConfig.ejercicioId]||{};
    const esBisetActual = ejConfig.biset === true && state.ejercicioActual + 1 < ejsDia.length;
    if(!state.sesionActiva) state.sesionActiva = { ejerciciosCompletados: {} };
    if(!state.sesionActiva.ejerciciosCompletados) state.sesionActiva.ejerciciosCompletados = {};

    if(esBisetActual) {
      const ejConfigB = ejsDia[state.ejercicioActual + 1];
      const ejInfoB   = state.ejercicios[ejConfigB.ejercicioId]||{};
      const seriesA = _collectSeriesData(ejConfig,  ejInfo,  'ea_');
      const seriesB = _collectSeriesData(ejConfigB, ejInfoB, 'eb_');
      state.sesionActiva.ejerciciosCompletados[state.ejercicioActual]     = { ejercicioId: ejConfig.ejercicioId,  series: seriesA, _draft: true };
      state.sesionActiva.ejerciciosCompletados[state.ejercicioActual + 1] = { ejercicioId: ejConfigB.ejercicioId, series: seriesB, _draft: true };
    } else {
      const series = _collectSeriesData(ejConfig, ejInfo, '');
      state.sesionActiva.ejerciciosCompletados[state.ejercicioActual] = { ejercicioId: ejConfig.ejercicioId, series, _draft: true };
    }
    savePendingSession();
  }

  // If previous exercise was part of a biserie (i.e. the one before was a biset leader), go back 2
  const prevIdx = state.ejercicioActual - 1;
  if(prevIdx >= 1 && ejsDia[prevIdx-1]?.biset === true) {
    state.ejercicioActual = Math.max(0, state.ejercicioActual - 2);
  } else {
    state.ejercicioActual = Math.max(0, state.ejercicioActual - 1);
  }
  renderEjercicioActual();
};

async function finalizarSesion() {
  // Clear rest timer if running
  if(_restTimerInterval) { clearInterval(_restTimerInterval); _restTimerInterval = null; }
  const restToast = document.getElementById('restTimerToast');
  if(restToast) restToast.remove();
  const restOvl = document.getElementById('restTimerOverlay');
  if(restOvl) restOvl.remove();

  // ── FIX: Validar que todos los ejercicios tienen al menos 1 serie marcada ──
  const { mesActual=1, semanaActual=1, diaActual=1 } = state.progreso||{};
  const diaData = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[diaActual];
  const ejsDia = Object.values(diaData?.ejercicios||{});
  const completados = state.sesionActiva?.ejerciciosCompletados||{};
  const faltantes = [];
  let ejIdx = 0;
  while(ejIdx < ejsDia.length) {
    const ej = ejsDia[ejIdx];
    const ejInfo = state.ejercicios[ej?.ejercicioId]||{};
    const esBiset = ej?.biset === true && ejIdx + 1 < ejsDia.length;
    const compA = completados[ejIdx];
    const allA = compA?.series?.every(s => s.completada);
    const compB = esBiset ? completados[ejIdx+1] : null;
    const allB = esBiset ? compB?.series?.every(s => s.completada) : true;
    if(!compA || !allA || !allB) {
      const ejNombre = ejInfo.nombre || `Ejercicio ${ejIdx+1}`;
      const ejNombreB = esBiset ? (state.ejercicios[ejsDia[ejIdx+1]?.ejercicioId]?.nombre || `Ejercicio ${ejIdx+2}`) : null;
      faltantes.push({ ejIdx, nombre: ejNombre + (ejNombreB ? ` + ${ejNombreB}` : ''), esBiset });
    }
    ejIdx += esBiset ? 2 : 1;
  }

  if(faltantes.length > 0) {
    const listaHTML = faltantes.map(f => `<li style="margin-bottom:6px">⚠️ <strong>${f.nombre}</strong> — series sin completar</li>`).join('');
    const result = await Swal.fire({
      background: 'rgba(8,16,36,0.98)', color: '#e8f4ff',
      title: '📋 Series sin completar',
      html: `<div style="text-align:left">
        <p style="margin-bottom:12px;color:rgba(232,244,255,0.7)">Los siguientes ejercicios tienen series sin marcar como hechas:</p>
        <ul style="list-style:none;padding:0;font-size:0.88rem">${listaHTML}</ul>
        <p style="margin-top:12px;font-size:0.82rem;color:rgba(232,244,255,0.5)">¿Finalizar así o regresar a completarlas?</p>
      </div>`,
      showCancelButton: true,
      confirmButtonText: '✅ Finalizar igual',
      cancelButtonText: '← Ir a completarlas',
      confirmButtonColor: '#00c8ff',
      cancelButtonColor: '#7b2fff',
    });
    if(!result.isConfirmed) {
      // Ir al primer ejercicio faltante
      state.ejercicioActual = faltantes[0].ejIdx;
      renderEjercicioActual();
      return;
    }
  }

  // ── CRITICAL ORDER: Save FIRST, then ask for fatigue ──
  // Session is safe regardless of what user does after this point.

  // 1. Mark fechaFin NOW
  state.sesionActiva.fechaFin = Date.now();

  // 2. Save session to Firebase IMMEDIATELY
  const sesId = `ses_${state.sesionActiva.fechaFin}`;
  await set(ref(db,`sesiones/${currentUser.id}/historial/${sesId}`), state.sesionActiva);
  if(!state.historial) state.historial = {};
  state.historial[sesId] = { ...state.sesionActiva };

  // 3. Clear pending session (safe — already saved to historial)
  await clearPendingSession();

  // 4. Clear active session state
  updateSessionDot(false);
  state.sesionActiva   = null;
  state.ejercicioActual = 0;

  // 5. Push history state so back button during fatigue modal can be caught
  history.pushState({ saykyo: 'fatigue' }, '');

  // 6. Ask for post-session fatigue (already saved — this is just an enrichment)
  const cansancio = await showFatigueModal('¿Qué tan cansado quedaste?', 'post');
  // Clean up the history state we pushed for the fatigue guard
  // Only call history.back() if we're still on that state (not already dismissed via back btn)
  if(history.state && history.state.saykyo === 'fatigue') {
    // Temporarily disable popstate to avoid re-triggering
    window._suppressPopstate = true;
    history.back();
    setTimeout(() => { window._suppressPopstate = false; }, 100);
  }

  if(cansancio !== null) {
    await set(ref(db,`sesiones/${currentUser.id}/historial/${sesId}/nivelCansancioFin`), cansancio);
    if(state.historial[sesId]) state.historial[sesId].nivelCansancioFin = cansancio;
  }

  // Advance progress (mesActual/semanaActual/diaActual already declared above)
  let newMes = mesActual, newSem = semanaActual, newDia = diaActual+1;
  // Calcular dinámicamente cuántos días tiene esta semana
  const _diasSemActual = Object.keys(state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias||{}).map(Number);
  const maxDiaSem = _diasSemActual.length ? Math.max(..._diasSemActual) : 5;

  // La semana está terminada SOLO si todos los días con ejercicios han sido completados
  // (incluyendo la sesión que acaba de guardarse, que ya está en state.historial)
  const _diasConEj = _diasSemActual.filter(d => {
    const diaData = state.rutinaData?.meses?.[mesActual]?.semanas?.[semanaActual]?.dias?.[d];
    return Object.keys(diaData?.ejercicios||{}).length > 0;
  });
  const semanaTerminada = _diasConEj.length > 0 &&
    _diasConEj.every(d => sesionCompletada(state.historial, mesActual, semanaActual, d));
  const mesTerminado = semanaTerminada && semanaActual === 4;

  if(newDia > maxDiaSem) { newDia=1; newSem++; }
  if(newSem>4) { newSem=1; newMes++; }

  const maxMes = Math.max(...Object.keys(state.rutinaData?.meses||{1:{}}).map(Number));
  if(newMes>maxMes) { newMes=maxMes; newSem=4; newDia=maxDiaSem; }

  const newProgreso = { rutinaActiva:state.rutinaId, mesActual:newMes, semanaActual:newSem, diaActual:newDia };
  await set(ref(db,`sesiones/${currentUser.id}/progreso`), newProgreso);
  state.progreso = newProgreso;

  await Swal.fire({
    icon:'success',
    title:'🎉 ¡Sesión completada!',
    html:`<div style="color:#e8f4ff">
      <div style="font-size:2rem;margin:10px 0">💪</div>
      <div>Siguiente: Mes ${newMes} · Sem ${newSem} · Día ${newDia}</div>
    </div>`,
    background:'rgba(8,16,36,0.98)', confirmButtonColor:'#00c8ff',
    confirmButtonText:'Continuar', timer:2000, showConfirmButton:true
  });

  // Check if monthly review is needed first (takes priority)
  if(mesTerminado) {
    const revSnap = await get(ref(db,`revisiones_mes/${currentUser.id}/m${mesActual}`));
    if(!revSnap.exists()) {
      await showRevisionMes(mesActual);
      switchTab('progreso'); return;
    }
  }
  // Check if weekly review is needed
  if(semanaTerminada) {
    const revSnap = await get(ref(db,`revisiones_semana/${currentUser.id}/m${mesActual}s${semanaActual}`));
    if(!revSnap.exists()) {
      await showRevisionSemana(mesActual, semanaActual);
      switchTab('progreso'); return;
    }
  }

  switchTab('progreso');
}

window.selectRevVal = (field, val) => {
  document.querySelectorAll(`[data-field="${field}"]`).forEach(d => {
    const active = +d.dataset.val === val;
    d.style.background = active ? 'var(--primary)' : 'rgba(255,255,255,0.05)';
    d.style.color = active ? '#000' : 'var(--text)';
    d.style.fontWeight = active ? '800' : '400';
    d.style.border = active ? '2px solid var(--primary)' : '1px solid rgba(255,255,255,0.1)';
    d.style.transform = active ? 'scale(1.08)' : 'scale(1)';
  });
  const lbl = document.getElementById(`${field}Label`);
  if(lbl) lbl.textContent = val + '/10';
  window[`_rev_${field}`] = val;
};

  el.closest('.rev-block').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));

// ============ PROGRESO ============

// ── Streak logic ──
// "Training streak" based on routine days with exercises.
// Weekend days (Sat/Sun) are NEVER counted as missed — they don't break a streak.
// A streak is consecutive calendar days where:
//   - The user trained (has a session recorded on that real date), OR
//   - It was a Saturday or Sunday (rest day by default), OR
//   - The user had no exercise scheduled in their routine for that day.
// A streak breaks when a weekday passes where the user had exercises in their routine
// but did NOT train, AND that day was more than 1 day ago (we don't penalize "today").
// Helper: convert timestamp to local 'YYYY-MM-DD' string (avoids UTC shift bugs)
function tsToLocalDateKey(ts) {
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function computeStreak(sesiones, rutinaData) {
  if(!sesiones.length) return { current: 0, max: 0, lastTrained: null, heatmap: {} };

  // Build a set of LOCAL dates (YYYY-MM-DD) when the user trained
  const trainedDates = new Set();
  sesiones.forEach(s => {
    const ts = s.fecha || s.fechaFin || s.fechaInicio || 0;
    if(ts) trainedDates.add(tsToLocalDateKey(ts));
  });

  // Find earliest training date and today (local)
  const allDates = [...trainedDates].sort();
  if(!allDates.length) return { current: 0, max: 0, lastTrained: null, heatmap: {} };

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayKey = tsToLocalDateKey(today.getTime());

  // firstDate: parse local key to local midnight
  const [fy,fm,fd] = allDates[0].split('-').map(Number);
  const firstDate = new Date(fy, fm-1, fd);

  // Build heatmap for last 12 weeks (using local dates)
  const heatmap = {};
  for(let i=0; i<=84; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = tsToLocalDateKey(d.getTime());
    const dow = d.getDay(); // 0=Sun 6=Sat
    if(trainedDates.has(key)) {
      heatmap[key] = 'trained';
    } else if(dow === 0 || dow === 6) {
      heatmap[key] = 'weekend';
    } else {
      heatmap[key] = 'missed';
    }
  }

  // Compute current streak (going backwards from today)
  // Rules:
  //   - If trained today → count today, then look backwards
  //   - If NOT trained today → start from yesterday (today doesn't break streak, it's still today)
  //   - Weekend days (Sat/Sun): skip silently, don't break streak
  //   - Weekday without training in the past → breaks streak
  let streak = 0;
  let lastTrained = null;

  const trainedToday = trainedDates.has(todayKey);
  const startOffset = trainedToday ? 0 : 1;

  for(let offset = startOffset; offset <= 730; offset++) {
    const d = new Date(today);
    d.setDate(today.getDate() - offset);
    if(d < firstDate) break;
    const key = tsToLocalDateKey(d.getTime());
    const dow = d.getDay();

    if(trainedDates.has(key)) {
      streak++;
      if(!lastTrained) lastTrained = d;
    } else if(dow === 0 || dow === 6) {
      // Weekend: free pass, keep going
      continue;
    } else {
      // Missed weekday in the past → break
      break;
    }
  }

  // If didn't train today but trained previously, still count as "streak" if no
  // weekday gap exists between last training and today
  // The loop above handles this correctly: it starts at yesterday (offset=1) and
  // breaks on the first missed weekday.

  const current = streak;

  // Compute max streak ever (forward pass over sorted allDates)
  let max = current;
  if(allDates.length >= 1) {
    let runStreak = 1, maxS = 1;
    for(let i=1; i<allDates.length; i++) {
      const [py,pm,pd] = allDates[i-1].split('-').map(Number);
      const [cy,cm,cd] = allDates[i].split('-').map(Number);
      const prev = new Date(py, pm-1, pd);
      const curr = new Date(cy, cm-1, cd);
      const diffDays = Math.round((curr - prev) / (1000*60*60*24));
      // Count intervening weekends as free
      let weekendsBetween = 0;
      for(let j=1; j<diffDays; j++) {
        const wd = new Date(prev); wd.setDate(prev.getDate()+j);
        if(wd.getDay()===0||wd.getDay()===6) weekendsBetween++;
      }
      const effectiveGap = diffDays - weekendsBetween;
      if(effectiveGap <= 1) { runStreak++; }
      else { maxS = Math.max(maxS, runStreak); runStreak = 1; }
    }
    max = Math.max(maxS, runStreak, current);
  }

  return { current, max, lastTrained, heatmap };
}

// ── Monthly calendar renderer ──
// Helper: obtener días del mes con sesión (como Set de 'YYYY-MM-DD') y conteo total
function getSessionDaysForMonth(hist, year, month) {
  const days = new Set();
  let count = 0;
  Object.values(hist||{}).forEach(s => {
    const ts = s.fechaFin || s.fechaInicio || s.fecha || 0;
    if(!ts) return;
    const d = new Date(ts);
    if(d.getFullYear() === year && d.getMonth() === month) {
      const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      days.add(key);
      count++;
    }
  });
  return { days, count };
}

// calHeatmap: the heatmap object {YYYY-MM-DD: 'trained'|'missed'|'weekend'}
// calYear/calMonth: currently displayed month (0-indexed)
let _calHeatmap = {};
let _calYear = new Date().getFullYear();
let _calMonth = new Date().getMonth();

function renderCalendar(heatmap, year, month, sessionDays, sessionCount) {
  _calHeatmap = heatmap;
  _calYear = year;
  _calMonth = month;

  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = tsToLocalDateKey(today.getTime());

  const monthName = new Date(year, month, 1).toLocaleDateString('es-CO', {month:'long', year:'numeric'});

  // First day of month (0=Sun…6=Sat), shift to Mon-first
  const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
  const startOffset = firstDow === 0 ? 6 : firstDow - 1; // blanks before day 1
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const DOW_LABELS = ['L','M','X','J','V','S','D'];

  // Can go back up to 3 months, can't go forward past current month
  const nowYear = today.getFullYear(), nowMonth = today.getMonth();
  const canPrev = !(year === nowYear - 1 && month === 0); // limit ~12 months back
  const canNext = !(year === nowYear && month === nowMonth);

  // Build day cells
  let cells = '';
  // Empty cells before day 1
  for(let i=0; i<startOffset; i++) {
    cells += `<div></div>`;
  }
  for(let day=1; day<=daysInMonth; day++) {
    const d = new Date(year, month, day);
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow = d.getDay(); // 0=Sun 6=Sat
    const isWeekend = dow === 0 || dow === 6;
    const isFuture = d > today;
    const isToday = key === todayKey;
    const hasSessions = sessionDays && sessionDays.has(key);
    const status = hasSessions ? 'trained' : (heatmap[key] || (isFuture ? 'future' : isWeekend ? 'weekend' : 'missed'));

    let bg, border, emoji, textColor;
    if(status === 'trained') {
      bg = 'rgba(0,229,160,0.18)'; border = 'rgba(0,229,160,0.5)';
      emoji = '💪'; textColor = 'var(--success)';
    } else if(status === 'weekend') {
      bg = 'rgba(123,47,255,0.12)'; border = 'rgba(123,47,255,0.2)';
      emoji = ''; textColor = 'rgba(232,244,255,0.35)';
    } else if(status === 'future') {
      bg = 'rgba(255,255,255,0.03)'; border = 'rgba(255,255,255,0.06)';
      emoji = ''; textColor = 'rgba(232,244,255,0.2)';
    } else {
      // missed weekday
      bg = 'rgba(255,77,109,0.1)'; border = 'rgba(255,77,109,0.25)';
      emoji = ''; textColor = 'rgba(255,77,109,0.7)';
    }

    const todayStyle = isToday
      ? `box-shadow:0 0 0 2px var(--primary);`
      : '';

    cells += `
      <div style="
        background:${bg};border:1px solid ${border};${todayStyle}
        border-radius:10px;padding:6px 4px;min-height:44px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
        position:relative;
      ">
        <div style="font-size:0.78rem;font-weight:${isToday?'900':'600'};color:${textColor};line-height:1">${day}</div>
        ${emoji ? `<div style="font-size:0.75rem;line-height:1">${emoji}</div>` : ''}
        ${isToday ? `<div style="position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--primary);box-shadow:0 0 6px var(--primary)"></div>` : ''}
      </div>`;
  }

  // Count trained days and missed days this month
  let calTrainedDays = 0, missedCount = 0;
  for(let day=1; day<=daysInMonth; day++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const d = new Date(year, month, day);
    const dow = d.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isFuture = d > today;
    if(!isWeekend && !isFuture) {
      const hasSess = sessionDays && sessionDays.has(key);
      if(hasSess || heatmap[key] === 'trained') calTrainedDays++;
      else missedCount++;
    }
  }
  // sessionCount = sesiones reales del mes (puede haber varias en un mismo día)
  const trainedCount = (sessionCount !== undefined) ? sessionCount : calTrainedDays;

  return `
    <div id="streakCalendar">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button onclick="calNav(-1)" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;${!canPrev?'opacity:0.3;pointer-events:none':''}">‹</button>
        <div style="font-size:0.9rem;font-weight:700;text-transform:capitalize;letter-spacing:0.5px">${monthName}</div>

}

window.calNav = (dir) => {
  let m = _calMonth + dir;
  let y = _calYear;
  if(m < 0) { m = 11; y--; }
  if(m > 11) { m = 0; y++; }
  const calEl = document.getElementById('streakCalendar');
  if(calEl) {
    const hist = state.historial || {};
    const { days, count } = getSessionDaysForMonth(hist, y, m);
    calEl.outerHTML = renderCalendar(_calHeatmap, y, m, days, count);
  }
};

async function renderProgreso() {
  const p = document.getElementById('mainPage');
  p.innerHTML = '<div class="loading-box"><div class="spinner"></div><span>Cargando progreso...</span></div>';

  const [histSnap, valSnap, rutSnap, revSemSnap, revMesSnap] = await Promise.all([
    get(ref(db,`sesiones/${currentUser.id}/historial`)),
    get(ref(db,`valoraciones/${currentUser.id}`)),
    get(ref(db,'rutinas')),
    get(ref(db,`revisiones_semana/${currentUser.id}`)),
    get(ref(db,`revisiones_mes/${currentUser.id}`))
  ]);
  const hist = histSnap.val()||{};
  const sesiones = Object.values(hist).sort((a,b)=>(a.fecha||0)-(b.fecha||0));
  const valoraciones = Object.values(valSnap.val()||{}).sort((a,b)=>a.fecha-b.fecha);

  const rutinas = rutSnap.val()||{};
  const miRutina = Object.values(rutinas).find(r=>r.usuario===currentUser.id && r.activa);

  if(sesiones.length===0 && valoraciones.length===0) {
    p.innerHTML = `
      <div class="glass-card" style="text-align:center;padding:40px 20px">
        <div style="font-size:3rem;margin-bottom:16px">📈</div>
        <h2 style="margin-bottom:10px">Sin historial aún</h2>
        <p style="color:var(--text-muted)">Completa tu primera sesión para ver tu progreso aquí</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="switchTab('entrenar')">💪 Ir a entrenar</button>
      </div>`;
    return;
  }

  // ─── Streak ───
  const { current: streakActual, max: streakMax, lastTrained, heatmap } = computeStreak(sesiones, miRutina);
  const streakEmoji = streakActual >= 30 ? '🔥🔥🔥' : streakActual >= 14 ? '🔥🔥' : streakActual >= 7 ? '🔥' : streakActual >= 3 ? '⚡' : '💪';
  const streakMessage = streakActual === 0 ? '¡Vuelve a entrenar hoy!' : streakActual === 1 ? '¡Bien! Sigue mañana' : streakActual < 7 ? '¡Vas bien! No pares' : streakActual < 14 ? '¡Semana completa!' : streakActual < 30 ? '¡Racha épica!' : '¡LEYENDA DEL GYM! 🏆';

  // ─── Charts data ───
  const weekMap = {};
  sesiones.forEach(s => {
    const wk = `M${s.mes}S${s.semana}`;
    if(!weekMap[wk]) weekMap[wk] = {cansancioFin:[],series:0,sesiones:0};
    weekMap[wk].cansancioFin.push(s.nivelCansancioFin||0);
    weekMap[wk].sesiones++;
    Object.values(s.ejerciciosCompletados||{}).forEach(ec=>{
      weekMap[wk].series += (ec.series||[]).length;
    });
  });
  const wkLabels = Object.keys(weekMap);
  const totalSeriesAll = Object.values(weekMap).reduce((a,w)=>a+w.series,0);

  // ─── Valoraciones trend ───
  const hasValoraciones = valoraciones.length >= 1;
  const lastVal = valoraciones[valoraciones.length-1];
  const firstVal = valoraciones[0];
  const anyHasMes = valoraciones.some(v => v.mes);
  const valLabels = valoraciones.map((v, i) => anyHasMes ? `Mes ${v.mes || (i+1)}` : new Date(v.fecha).toLocaleDateString('es-CO',{month:'short',year:'2-digit'}));

  const deltaFmt = (delta, invertido=false) => {
    if(delta===undefined||delta===null) return '';
    const n = parseFloat(delta).toFixed(1);
    const neutro = Math.abs(n) < 0.1;
    if(neutro) return `<span style="color:var(--text-muted)">→ sin cambio</span>`;
    const subio = parseFloat(n) > 0;
    const esBueno = invertido ? !subio : subio;
    const arrow = subio ? '▲' : '▼';
    const sign = subio ? '+' : '';
    const color = esBueno ? 'var(--success)' : 'var(--error)';
    return `<span style="color:${color}">${arrow}${sign}${Math.abs(n)}</span>`;
  };

  const deltaGrasa = valoraciones.length>1 ? lastVal.grasa-firstVal.grasa : null;
  const deltaMuscular = valoraciones.length>1 ? lastVal.muscular-firstVal.muscular : null;
  const deltaPeso = valoraciones.length>1 ? lastVal.peso-firstVal.peso : null;

  // ─── Pro chart helpers (mismos que dashboard) ───
  const PRO_PALETTE = [
    '#00c8ff','#7b2fff','#00e5a0','#ff6b35','#ffd60a',
    '#ff4d6d','#4ade80','#818cf8','#f472b6','#38bdf8',
    '#fb923c','#a3e635','#e879f9','#2dd4bf','#facc15'
  ];

  function proChartOptions(extraY={}) {
    return {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{
          position:'bottom',
          labels:{ color:'rgba(232,244,255,0.7)', font:{family:'Exo 2',size:10}, boxWidth:12, padding:12, usePointStyle:true, pointStyle:'circle' }
        },
        tooltip:{
          backgroundColor:'rgba(6,12,28,0.95)', borderColor:'rgba(0,200,255,0.25)', borderWidth:1,
          titleColor:'#e8f4ff', bodyColor:'rgba(232,244,255,0.75)',
          titleFont:{family:'Exo 2',weight:'700',size:12}, bodyFont:{family:'Exo 2',size:11},
          padding:10, cornerRadius:10
        }
      },
      scales:{
        x:{ grid:{color:'rgba(255,255,255,0.04)',drawBorder:false}, ticks:{color:'rgba(232,244,255,0.5)',font:{family:'Exo 2',size:10}} },
        y:{ grid:{color:'rgba(255,255,255,0.04)',drawBorder:false}, ticks:{color:'rgba(232,244,255,0.5)',font:{family:'Exo 2',size:10}}, min:extraY.min, max:extraY.max }
      }
    };
  }

  function makeProDataset(name, data, i, type='line') {
    const color = PRO_PALETTE[i % PRO_PALETTE.length];
    if(type==='bar') return {
      label:name, data, backgroundColor:color+'55', borderColor:color, borderWidth:2, borderRadius:6, borderSkipped:false
    };
    return {
      label:name, data, borderColor:color, backgroundColor:color+'20',
      pointBackgroundColor:color, pointBorderColor:'#060c18',
      pointRadius:4, pointHoverRadius:7, pointBorderWidth:2,
      tension:0.4, fill:false, spanGaps:true, borderWidth:2.5
    };
  }

  function renderProChart(canvasId, type, labels, datasets, extraY={}) {
    let canvas = document.getElementById(canvasId);
    if(!canvas) {
      const wrap = document.querySelector(`[data-canvas="${canvasId}"]`);
      if(wrap) { wrap.innerHTML=`<canvas id="${canvasId}"></canvas>`; canvas=document.getElementById(canvasId); }
    }
    if(!canvas) return;
    if(canvas._proChart) { canvas._proChart.destroy(); canvas._proChart=null; }
    const hasData = datasets.length>0 && datasets.some(d=>d.data&&d.data.some(v=>v!=null&&!isNaN(v)&&v!==0));
    if(!hasData) {
      const wrap = canvas.parentElement;
      if(wrap) { wrap.setAttribute('data-canvas',canvasId); wrap.innerHTML=`<div class="pro-chart-empty"><div class="ico">📭</div><span>Sin datos aún</span></div>`; }
      return;
    }
    const opts = proChartOptions(extraY);
    canvas._proChart = new Chart(canvas, {type, data:{labels, datasets}, options:opts});
  }

  function buildProCard(id, icon, title, badge, filterTags, controlsHTML, canvasHTML) {
    return `
    <div class="pro-chart-card" id="card_${id}">
      <div class="pro-chart-header">
        <div class="pro-chart-title">${icon} ${title} <span class="pro-chart-badge">${badge}</span></div>
        <div class="pro-chart-controls">${controlsHTML}</div>
      </div>
      <div class="pro-chart-filter-tags">${filterTags}</div>
      <div class="pro-chart-body">${canvasHTML}</div>
    </div>`;
  }

  // ─── Data builders (solo sesiones del usuario actual) ───
  const allSessions = sesiones; // ya filtradas al usuario logueado

  // Rango de semanas disponibles
  const semSet = new Set(allSessions.map(s=>(s.mes-1)*4+s.semana));
  const semMin = semSet.size ? Math.min(...semSet) : 1;
  const semMax = semSet.size ? Math.max(...semSet) : 1;
  const nSem = semMax - semMin + 1;
  const labels = Array.from({length:nSem},(_,i)=>`Sem ${semMin+i}`);

  // Cargar ejercicios y categorias para los charts
  const [ejSnap2, catSnap2] = await Promise.all([
    get(ref(db,'ejercicios')),
    get(ref(db,'categorias'))
  ]);
  const ejs = ejSnap2.val()||{};
  const cats = catSnap2.val()||{};

  const ejsEnData={}, catsEnData={};
  allSessions.forEach(ses=>{
    Object.values(ses.ejerciciosCompletados||{}).forEach(ec=>{
      if(ejs[ec.ejercicioId]) ejsEnData[ec.ejercicioId]=ejs[ec.ejercicioId].nombre;
      const cat=ejs[ec.ejercicioId]?.categoria;
      if(cat&&cats[cat]) catsEnData[cat]=cats[cat].nombre;
    });
  });
  const ejOL=`<option value="">Todos</option>`+Object.entries(ejsEnData).map(([id,n])=>`<option value="${id}">${n}</option>`).join('');
  const catOL=`<option value="">Todas</option>`+Object.entries(catsEnData).map(([id,n])=>`<option value="${id}">${n}</option>`).join('');
  const semOL=Array.from({length:nSem},(_,i)=>{const s=semMin+i;return`<option value="${s}">Sem ${s}</option>`;}).join('');

  function buildCarga(ejFil, chartType) {
    const map={};
    allSessions.forEach(ses=>{
      Object.values(ses.ejerciciosCompletados||{}).forEach(ec=>{
        if(ejFil && ec.ejercicioId!==ejFil) return;
        const n=ejs[ec.ejercicioId]?.nombre||ec.ejercicioId;
        if(!map[n]) map[n]=Array(nSem).fill(null).map(()=>[]);
        const idx=(ses.mes-1)*4+ses.semana-semMin;
        if(idx>=0&&idx<nSem)(ec.series||[]).forEach(s=>{if(+s.peso>0)map[n][idx].push(+s.peso);});
      });
    });
    return Object.entries(map).map(([name,wks],i)=>
      makeProDataset(name, wks.map(w=>w.length?+(w.reduce((a,b)=>a+b)/w.length).toFixed(1):null), i, chartType)
    );
  }

  function buildRPE(ejFil, chartType) {
    const map={};
    allSessions.forEach(ses=>{
      Object.values(ses.ejerciciosCompletados||{}).forEach(ec=>{
        if(ejFil && ec.ejercicioId!==ejFil) return;
        const n=ejs[ec.ejercicioId]?.nombre||ec.ejercicioId;
        if(!map[n]) map[n]=Array(nSem).fill(null).map(()=>[]);
        const idx=(ses.mes-1)*4+ses.semana-semMin;
        if(idx>=0&&idx<nSem)(ec.series||[]).forEach(s=>{if(s.rirRpe!=null)map[n][idx].push(s.rirRpe);});
      });
    });
    return Object.entries(map).map(([name,wks],i)=>
      makeProDataset(name, wks.map(w=>w.length?+(w.reduce((a,b)=>a+b)/w.length).toFixed(2):null), i, chartType)
    );
  }

  function buildVol(catFil, chartType) {
    const map={};
    allSessions.forEach(ses=>{
      Object.values(ses.ejerciciosCompletados||{}).forEach(ec=>{
        const ejCat=ejs[ec.ejercicioId]?.categoria;
        if(catFil && ejCat!==catFil) return;
        const cN=cats[ejCat]?.nombre||'Sin cat';
        if(!map[cN]) map[cN]=Array(nSem).fill(0);
        const idx=(ses.mes-1)*4+ses.semana-semMin;
        if(idx>=0&&idx<nSem) map[cN][idx]+=(ec.series||[]).length;
      });
    });
    return Object.entries(map).map(([name,data],i)=>makeProDataset(name,data,i,chartType));
  }

  function buildIntSesion(semA) {
    const map={};
    allSessions.filter(s=>(s.mes-1)*4+s.semana===semA).forEach(ses=>{
      const k=`Día ${ses.dia}`;
      if(ses.nivelCansancioFin!=null) map[k]=ses.nivelCansancioFin;
    });
    const lbs=Object.keys(map).sort((a,b)=>+a.replace('Día ','')-+b.replace('Día ',''));
    return { lbs, vals:lbs.map(k=>map[k]) };
  }

  function buildDuracion() {
    const bySem=Array(nSem).fill(null).map(()=>[]);
    allSessions.forEach(ses=>{
      if(!ses.fechaInicio||!ses.fechaFin) return;
      const mins=Math.round((ses.fechaFin-ses.fechaInicio)/60000);
      if(mins<5||mins>300) return;
      const idx=(ses.mes-1)*4+ses.semana-semMin;
      if(idx>=0&&idx<nSem) bySem[idx].push(mins);
    });
    const vals=bySem.map(w=>w.length?Math.round(w.reduce((a,b)=>a+b)/w.length):null);
    return [makeProDataset('Duración promedio (min)', vals, 5, 'line')];
  }

  function buildFrecuencia() {
    const bySem=Array(nSem).fill(0);
    allSessions.forEach(ses=>{
      const idx=(ses.mes-1)*4+ses.semana-semMin;
      if(idx>=0&&idx<nSem) bySem[idx]++;
    });
    return [makeProDataset('Sesiones', bySem, 3, 'bar')];
  }

  function buildTopEjercicios() {
    const map={};
    allSessions.forEach(ses=>{
      Object.values(ses.ejerciciosCompletados||{}).forEach(ec=>{
        const n=ejs[ec.ejercicioId]?.nombre||ec.ejercicioId;
        map[n]=(map[n]||0)+(ec.series||[]).length;
      });
    });
    const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);
    return {
      lbs: sorted.map(([n])=>n.length>20?n.slice(0,18)+'…':n),
      vals: sorted.map(([,v])=>v)
    };
  }

  function buildDescanso() {
    const bySem=Array(nSem).fill(null).map(()=>[]);
    allSessions.forEach(ses=>{
      if(ses.nivelCansancioInicio==null) return;
      const idx=(ses.mes-1)*4+ses.semana-semMin;
      if(idx>=0&&idx<nSem) bySem[idx].push(ses.nivelCansancioInicio);
    });
    const vals=bySem.map(w=>w.length?+(w.reduce((a,b)=>a+b)/w.length).toFixed(1):null);
    return [makeProDataset('Nivel de descanso al llegar', vals, 2, 'line')];
  }

  const withDur=allSessions.filter(s=>s.fechaInicio&&s.fechaFin&&(s.fechaFin-s.fechaInicio)/60000>5);
  const avgDur=withDur.length?Math.round(withDur.reduce((a,s)=>a+(s.fechaFin-s.fechaInicio)/60000,0)/withDur.length):'-';

  function ftag(txt){ return `<span class="pro-filter-tag">${txt}</span>`; }

  p.innerHTML = `
    <!-- ═══ STREAK CARD ═══ -->
    <div class="glass-card" style="position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(255,107,53,0.12),rgba(123,47,255,0.1),rgba(0,200,255,0.08));border-color:rgba(255,107,53,0.3)">
      <div style="position:absolute;inset:0;pointer-events:none;opacity:0.03;background:radial-gradient(circle at 80% 50%,#ff6b35 0%,transparent 60%)"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div class="card-title" style="margin:0">🔥 Racha de entrenamiento</div>
        <div style="font-size:0.75rem;color:var(--text-muted)">Fines de semana no cuentan</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">
        <div style="text-align:center;flex:1;min-width:100px">
          <div style="font-size:4rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#ff6b35,#ffd60a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${streakActual}</div>
          <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Días seguidos</div>
        </div>
        <div style="flex:0 0 1px;height:60px;background:rgba(255,255,255,0.1)"></div>
        <div style="text-align:center;flex:1;min-width:100px">
          <div style="font-size:3rem;font-weight:900;line-height:1;color:var(--accent)">${streakMax}</div>
          <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Récord personal</div>
        </div>
        <div style="flex:0 0 1px;height:60px;background:rgba(255,255,255,0.1)"></div>
        <div style="text-align:center;flex:1;min-width:100px">
          <div style="font-size:2.5rem;font-weight:900;line-height:1">${streakEmoji}</div>
          <div style="font-size:0.75rem;color:rgba(255,107,53,0.9);font-weight:700;margin-top:4px">${streakMessage}</div>
        </div>
      </div>
      ${(() => {
        const milestones = [3,7,14,21,30,60,90];
        const next = milestones.find(m=>m>streakActual) || 100;
        const prev = milestones[milestones.indexOf(next)-1] || 0;
        const pct = Math.round(((streakActual-prev)/(next-prev))*100);
        return `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-bottom:5px">

            </div>
          </div>`;
      })()}

        ${(() => {
          const cy = new Date().getFullYear(), cm = new Date().getMonth();
          const { days: sDays, count: sCount } = getSessionDaysForMonth(state.historial||{}, cy, cm);
          return renderCalendar(heatmap, cy, cm, sDays, sCount);
        })()}
      </div>

    <!-- ═══ RESUMEN ═══ -->
    <div class="glass-card">

          ${buildProCard('carga','📈','Carga','Peso prom / semana', ftag('Tus datos'),

             <div class="pro-chart-type-btn">
               <button class="active" id="mypct_rpe_line" onclick="myPcType('rpe','line')">〜</button>
               <button id="mypct_rpe_bar" onclick="myPcType('rpe','bar')">▮</button>

          ${buildProCard('vol','📦','Volumen','Series por categoría / sem', ftag('Tus datos'),

      if(!revSemanas.length && !revMeses.length) return '';
      return `
        <div class="glass-card">
          <div class="card-title">📋 Mis revisiones semanales</div>
          ${revSemanas.length === 0 ? '<div style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:10px">Sin revisiones semanales aún</div>' :
          revSemanas.slice(-4).reverse().map(([key, rev]) => `
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;margin-bottom:8px">
